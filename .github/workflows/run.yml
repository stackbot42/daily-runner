name: Daily Task

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

      # COREJOB - TEMPORARILY DISABLED WHILE TESTING
      # - name: Clone corejob
      #   run: git clone ...
      # - name: Run corejob
      #   run: ...

      # JOB DRILLER - TESTING THIS NOW
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone job-driller
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/quickwisestack/job-driller-pro.git

      - name: Run job-driller
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd job-driller-pro
          npm install
          node server.js &
          SERVER_PID=$!
          sleep 10
          curl --fail --retry 3 --retry-delay 5 http://localhost:3000/run
          sleep 480
          kill $SERVER_PID || true

      # PRIVATE JOBS
      - name: Clone private jobs
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/quickwisestack/Private-Jobs-Scrapper.git

      - name: Run private jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd Private-Jobs-Scrapper
          npm install
          PORT=4000 node server.js &
          SERVER_PID=$!
          sleep 10
          curl --fail --retry 3 --retry-delay 5 http://localhost:4000/run
          sleep 600
          kill $SERVER_PID || true

      # TELEGRAM
      - name: Clone telegram
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/quickwisestack/telegram-ingestion.git

      - name: Run telegram ingestion
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd telegram-ingestion
          npm install
          node run-once.js
