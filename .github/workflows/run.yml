name: Daily Task

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

      # ---------- COREJOB ----------
      - name: Clone corejob
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/quickwisestack/corejob-scraper.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ✅ Cache Playwright (IMPORTANT)
      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-cache

      - name: Run corejob
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          COREJOB_EMAIL: ${{ secrets.COREJOB_EMAIL }}
          COREJOB_PASSWORD: ${{ secrets.COREJOB_EMAIL }}
        run: |
          cd corejob-scraper
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium
          python scraper.py

      # ---------- JOB DRILLER ----------
      - name: Clone job-driller
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/quickwisestack/job-driller-pro.git

      - name: Run job-driller
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd job-driller-pro
          npm install
          node server.js &
          sleep 5
          curl http://localhost:3000/run

      # ---------- PRIVATE JOBS ----------
      - name: Clone private jobs
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/quickwisestack/Private-Jobs-Scrapper.git

      - name: Run private jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd Private-Jobs-Scrapper
          npm install
          PORT=4000 node server.js &
          sleep 5
          curl http://localhost:4000/run

      # ---------- TELEGRAM ----------
      - name: Clone telegram
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/quickwisestack/telegram-ingestion.git

      - name: Run telegram ingestion
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd telegram-ingestion
          npm install
          node run-once.js
