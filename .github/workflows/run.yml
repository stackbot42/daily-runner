name: Daily Task

on:
  schedule:
    - cron: '30 4 * * *'   # 10:00 AM IST = 04:30 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

      # ── COREJOB (Python + Playwright) ──────────────────────────────────

      - name: Clone corejob
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/quickwisestack/corejob-scraper.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install corejob dependencies
        run: |
          cd corejob-scraper
          pip install -r requirements.txt
          pip install playwright

      - name: Install Playwright browsers WITH system dependencies
        run: |
          cd corejob-scraper
          playwright install --with-deps chromium
        # ^^^ THIS IS THE CRITICAL FIX
        # --with-deps installs all required OS libraries (libgbm, libasound2, etc.)
        # Without this, Chromium launches but crashes silently during login

      - name: Run corejob
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          COREJOB_EMAIL: ${{ secrets.COREJOB_EMAIL }}
          COREJOB_PASSWORD: ${{ secrets.COREJOB_PASSWORD }}
          # Force Playwright to use the installed browser, not a system one
          PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
        run: |
          cd corejob-scraper
          python scraper.py

      # ── JOB DRILLER (Node.js) ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Clone job-driller
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/quickwisestack/job-driller-pro.git

      

      - name: Run job-driller
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd job-driller-pro
          npm install
          node server.js &
          SERVER_PID=$!
          sleep 10
          curl --fail --retry 3 --retry-delay 5 http://localhost:3000/run
          kill $SERVER_PID || true

      # ── PRIVATE JOBS (Node.js) ─────────────────────────────────────────

      - name: Clone private jobs
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/quickwisestack/Private-Jobs-Scrapper.git

      - name: Run private jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd Private-Jobs-Scrapper
          npm install
          PORT=4000 node server.js &
          SERVER_PID=$!
          sleep 10
          curl --fail --retry 3 --retry-delay 5 http://localhost:4000/run
          kill $SERVER_PID || true

      # ── TELEGRAM INGESTION (Node.js) ───────────────────────────────────

      - name: Clone telegram
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/quickwisestack/telegram-ingestion.git

      - name: Run telegram ingestion
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd telegram-ingestion
          npm install
          node run-once.js
